name = "epoxidovo"
compatibility_date = "2026-05-24"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ENV PREMENNÉ — sú nastavené v Cloudflare Pages dashboarde (Settings → Environment Variables).
# Tu len pre referenciu, neukladáme tajomstvá do gitu.
#
# Vyžadované:
#   DATABASE_URL                  - Neon Postgres pooler URL
#   AUTH_SECRET                   - 32+ random string
#   AUTH_URL                      - https://epoxidovo.sk
#   AUTH_RESEND_KEY               - Resend API key
#   RESEND_API_KEY                - Resend API key (rovnaký)
#   EMAIL_FROM                    - Sender adresa
#   ADMIN_EMAILS                  - Comma-separated allowlist
#   NEXT_PUBLIC_META_PIXEL_ID     - Meta pixel ID (verejný)

# POZNÁMKA o cron joboch:
# Cloudflare Pages projects nepodporujú "[[triggers.crons]]" v wrangler.toml.
# Lead follow-up cron job (denne 09:00 UTC) sa nasadí ako separátny Cloudflare
# Worker po prvom úspešnom Pages deploy. Bude volať internú API route
# /api/cron/lead-followup s autorizačným tokenom.
